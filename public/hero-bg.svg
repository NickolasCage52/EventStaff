<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f18"/>
      <stop offset="25%" style="stop-color:#1a2e26"/>
      <stop offset="50%" style="stop-color:#1C1C1C"/>
      <stop offset="75%" style="stop-color:#142F25"/>
      <stop offset="100%" style="stop-color:#0a1914"/>
    </linearGradient>
    <linearGradient id="accent1" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" style="stop-color:#2A6B56;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent2" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4E3F;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#2A6B56;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" style="stop-color:transparent;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.25"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg1)"/>
  <ellipse cx="1500" cy="150" rx="600" ry="400" fill="url(#glow)"/>
  <ellipse cx="400" cy="950" rx="700" ry="300" fill="#1D4E3F" opacity="0.1"/>
  <rect width="1920" height="1080" fill="url(#accent1)"/>
  <rect width="1920" height="1080" fill="url(#accent2)"/>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
